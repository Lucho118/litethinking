name: SonarCloud Backend Scan

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'domain/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'domain/**'
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: litethinking
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Necesario para análisis de calidad
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install
      
      - name: Run tests with coverage
        working-directory: ./backend
        env:
          SECRET_KEY: "ci-dummy-secret-key-only-for-testing-do-not-use-in-production"
          DEBUG: "False"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/litethinking"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          CORS_ALLOWED_ORIGINS: "http://localhost:3000"
          DJANGO_SETTINGS_MODULE: "config.settings.test"
        run: |
          poetry run pytest --cov=apps --cov=config --cov-report=xml:coverage.xml --cov-report=html -v
      
      - name: Verify coverage.xml exists
        run: |
          if [ -f backend/coverage.xml ]; then
            echo "✓ coverage.xml found at backend/coverage.xml"
            ls -lh backend/coverage.xml
          else
            echo "✗ coverage.xml NOT found"
            find . -name "coverage.xml" -o -name "coverage*"
          fi
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ./backend
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
