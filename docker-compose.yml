services:

  db:
    image: pgvector/pgvector:pg16   # PostgreSQL 16 con extensión pgvector incluida
    container_name: litethinking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litethinking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"                  # expuesto en localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litethinking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
