sonar.projectKey=litethinking-backend
sonar.projectName=LiteThinking Backend
sonar.projectVersion=1.0
sonar.organization=lucho118

# Fuentes a analizar (relativo a projectBaseDir = backend/)
sonar.sources=apps,config
sonar.python.version=3.12

# Exclusiones
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/*.egg-info/**

# Test inclusions (archivos que Sonar trata como tests, no como fuentes)
sonar.test.inclusions=apps/**/tests/**
sonar.coverage.exclusions=apps/**/tests/**

# Cobertura — relativo a projectBaseDir (backend/coverage.xml)
# NO duplicar esta ruta en el workflow como -D arg (se resuelve desde root, no desde projectBaseDir)
sonar.python.coverage.reportPaths=coverage.xml
